services:
    postgres:
        image: postgres:17
        container_name: pingping-postgres
        restart: unless-stopped

        environment:
            POSTGRES_DB: ping-ping
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres

        ports:
            - "5432:5432"

        volumes:
            - postgres-data:/var/lib/postgresql/data
    redis:
        image: redis:7
        ports:
            - "6379:6379"

volumes:
  postgres-data:
